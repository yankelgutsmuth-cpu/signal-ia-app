<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal IA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d14; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 40px; }
.top { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 0; }
.logo { font-size: 11px; letter-spacing: 3px; color: #f7931a; font-weight: 700; display:flex; align-items:center; gap:8px; }
.live-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #00d4aa20; color: #00d4aa; letter-spacing: 1px; }
.top-right { display: flex; align-items: center; gap: 8px; }
.cur-btn { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; background: #1a1a2e; color: #555; }
.cur-btn.active { background: #f7931a; color: #000; }
.countdown { font-size: 10px; color: #333; }
.cat-row, .asset-row { display: flex; gap: 8px; padding: 10px 20px 0; overflow-x: auto; }
.cat-btn { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid transparent; cursor: pointer; background: transparent; color: #444; white-space: nowrap; }
.cat-btn.active { background: #1a1a2e; color: #fff; border-color: #ffffff33; }
.asset-btn { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 2px solid transparent; cursor: pointer; background: #1a1a2e; color: #555; white-space: nowrap; }
.price-section { padding: 16px 20px 0; }
.main-price { font-size: 40px; font-weight: 700; letter-spacing: -1px; line-height: 1; margin-bottom: 4px; }
.asset-name { font-size: 12px; color: #555; margin-bottom: 10px; }
.badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 6px; }
.resume-box { font-size: 11px; color: #555; line-height: 1.5; padding: 10px 14px; background: #0d0d1a; border-radius: 8px; border: 1px solid #1a1a2e; margin-bottom: 4px; }
.updated { font-size: 10px; color: #333; }
.tabs { display: flex; border-bottom: 1px solid #111; padding: 0 16px; overflow-x: auto; margin-top: 12px; }
.tab-btn { padding: 10px 12px; font-size: 11px; font-weight: 600; border: none; background: none; cursor: pointer; color: #444; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
.tab-btn.active { border-bottom-width: 2px; }
.section-label { font-size: 10px; color: #333; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; padding-left: 8px; }
.chart-wrap { padding: 16px 16px 4px; }
.horizon-bar { display: flex; justify-content: center; gap: 6px; padding: 12px 20px 16px; border-bottom: 1px solid #111; }
.horizon-btn { padding: 6px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; background: #1a1a2e; color: #555; }
.pred-section { padding: 18px 20px; }
.pred-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; }
.pred-row:last-child { border-bottom: none; }
.pred-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.conf-bar { width: 60px; height: 3px; background: #1a1a2e; border-radius: 2px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 2px; }
.ind-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; }
.news-item { padding: 12px 0; border-bottom: 1px solid #111; }
.sentiment-box { border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
.fact-item { padding: 14px 0; border-bottom: 1px solid #111; }
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 16px; }
.footer-note { text-align: center; font-size: 10px; color: #1a1a2e; padding: 16px 20px 0; line-height: 1.6; }
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><div style="font-size:44px">₿</div><div style="font-size:12px;color:#f7931a;letter-spacing:2px">Chargement données réelles...</div></div></div>

<script>
const BACKEND_URL = "https://web-production-cf0d8.up.railway.app";

const ASSETS = {
  BTC: { name: "Bitcoin", symbol: "₿", price_eur: 59800, price_usd: 65200, color: "#f7931a", category: "crypto" },
  ETH: { name: "Ethereum", symbol: "Ξ", price_eur: 2840, price_usd: 3090, color: "#627eea", category: "crypto" },
  SOL: { name: "Solana", symbol: "◎", price_eur: 148, price_usd: 161, color: "#9945ff", category: "crypto" },
  XAU: { name: "Or", symbol: "⚜", price_eur: 2780, price_usd: 3020, color: "#FFD700", category: "commodity" },
  OIL: { name: "Pétrole Brent", symbol: "🛢", price_eur: 74, price_usd: 80.5, color: "#cd853f", category: "commodity" },
  TSLA: { name: "Tesla", symbol: "🚗", price_eur: 172, price_usd: 187, color: "#cc0000", category: "stock" },
  NVDA: { name: "NVIDIA", symbol: "🎮", price_eur: 118, price_usd: 128, color: "#76b900", category: "stock" },
  AAPL: { name: "Apple", symbol: "🍎", price_eur: 192, price_usd: 209, color: "#555555", category: "stock" },
};

const FALLBACK = {
  XAU: { sentiment_global: "BULLISH", score_sentiment: 1.5, news: [{titre:"Banque Centrale de Chine achète 50 tonnes d'or",impact:"POSITIF",score:2},{titre:"Tensions géopolitiques — fuite vers valeurs refuges",impact:"POSITIF",score:2},{titre:"Fed signale pause dans les hausses de taux",impact:"POSITIF",score:1},{titre:"Inflation américaine repart à la hausse",impact:"POSITIF",score:1}], indicators:{rsi:58,macd:"POSITIF",volatility:0.8,bull_score:2}, predictions:{"1h":{direction:"HAUSSE",amplitude:0.4,confiance:76},"24h":{direction:"HAUSSE",amplitude:1.8,confiance:71},"1sem":{direction:"HAUSSE",amplitude:4.2,confiance:65}}, facteurs:{macro:"Dollar en baisse + inflation en hausse.",sentiment_marche:"Aversion au risque — flux vers valeurs refuges.",institutionnel:"Banques centrales BRICS accumulent l'or.",technique:"Or au-dessus de toutes ses moyennes mobiles."}, resume:"Achats banques centrales + tensions géopolitiques + dollar faible — or très haussier." },
  OIL: { sentiment_global: "BULLISH", score_sentiment: 1.3, news: [{titre:"OPEP+ annonce réduction de production",impact:"POSITIF",score:2},{titre:"Stocks pétrole USA en forte baisse",impact:"POSITIF",score:2},{titre:"Chine annonce plan de relance massif",impact:"POSITIF",score:1},{titre:"Tensions en mer Rouge perturbent les tankers",impact:"POSITIF",score:1}], indicators:{rsi:55,macd:"POSITIF",volatility:1.2,bull_score:2}, predictions:{"1h":{direction:"HAUSSE",amplitude:0.6,confiance:72},"24h":{direction:"HAUSSE",amplitude:2.4,confiance:66},"1sem":{direction:"HAUSSE",amplitude:6.8,confiance:60}}, facteurs:{macro:"Reprise économique mondiale.",sentiment_marche:"Traders positionnés à la hausse.",institutionnel:"Fonds énergétiques surpondèrent le pétrole.",technique:"Brent au-dessus des MA7 et MA14."}, resume:"OPEP+ réduit la production + stocks en baisse + demande Chine — pétrole haussier." },
  TSLA: { sentiment_global: "BULLISH", score_sentiment: 1.2, news: [{titre:"Tesla dépasse les attentes — 500 000 livraisons",impact:"POSITIF",score:2},{titre:"Nouveau modèle Tesla à 25 000$ annoncé",impact:"POSITIF",score:2},{titre:"Tesla lance son réseau de taxis autonomes",impact:"POSITIF",score:2},{titre:"Marges brutes Tesla remontent à 22%",impact:"POSITIF",score:1}], indicators:{rsi:62,macd:"POSITIF",volatility:2.1,bull_score:2}, predictions:{"1h":{direction:"HAUSSE",amplitude:1.2,confiance:70},"24h":{direction:"HAUSSE",amplitude:3.8,confiance:64},"1sem":{direction:"HAUSSE",amplitude:9.4,confiance:57}}, facteurs:{macro:"Taux en baisse favorisent les valeurs de croissance.",sentiment_marche:"Enthousiasme autour du FSD et des robotaxis.",institutionnel:"ARK Invest et Vanguard renforcent leurs positions.",technique:"TSLA au-dessus de MA50 et MA200."}, resume:"Livraisons record + robotaxis + marges en hausse — Tesla très haussier." },
  NVDA: { sentiment_global: "BULLISH", score_sentiment: 1.8, news: [{titre:"NVIDIA résultats records — data center +220%",impact:"POSITIF",score:2},{titre:"Microsoft commande 100 000 GPU H200",impact:"POSITIF",score:2},{titre:"NVIDIA lance le Blackwell B200",impact:"POSITIF",score:2},{titre:"OpenAI dépendra de NVIDIA pour 5 ans",impact:"POSITIF",score:1}], indicators:{rsi:71,macd:"POSITIF",volatility:2.8,bull_score:3}, predictions:{"1h":{direction:"HAUSSE",amplitude:1.6,confiance:78},"24h":{direction:"HAUSSE",amplitude:4.9,confiance:72},"1sem":{direction:"HAUSSE",amplitude:13.8,confiance:65}}, facteurs:{macro:"Course à l'IA mondiale.",sentiment_marche:"NVIDIA valeur préférée de Wall Street.",institutionnel:"Tous les grands fonds surpondèrent NVDA.",technique:"NVDA en tendance haussière forte."}, resume:"Résultats records + monopole IA — NVIDIA exceptionnel." },
  AAPL: { sentiment_global: "BULLISH", score_sentiment: 0.9, news: [{titre:"Apple Intelligence booste les ventes iPhone",impact:"POSITIF",score:2},{titre:"App Store revenus en hausse de 18%",impact:"POSITIF",score:1},{titre:"Rachat d'actions de 110 milliards $",impact:"POSITIF",score:2},{titre:"Inde devient 2ème marché mondial Apple",impact:"POSITIF",score:1}], indicators:{rsi:56,macd:"POSITIF",volatility:1.1,bull_score:1}, predictions:{"1h":{direction:"HAUSSE",amplitude:0.6,confiance:73},"24h":{direction:"HAUSSE",amplitude:2.1,confiance:67},"1sem":{direction:"HAUSSE",amplitude:5.8,confiance:62}}, facteurs:{macro:"Baisse des taux favorable.",sentiment_marche:"Apple Intelligence crée un nouveau cycle.",institutionnel:"Berkshire maintient Apple comme 1ère position.",technique:"AAPL au-dessus de MA50 et MA200."}, resume:"Rachat d'actions record + Apple Intelligence — AAPL solide." },
};

const HORIZONS = [{key:"1h",label:"1h",hours:1},{key:"6h",label:"6h",hours:6},{key:"12h",label:"12h",hours:12},{key:"24h",label:"24h",hours:24},{key:"48h",label:"48h",hours:48},{key:"1sem",label:"1 sem",hours:168}];
const CATEGORIES = [{key:"crypto",label:"₿ Crypto",assets:["BTC","ETH","SOL"]},{key:"commodity",label:"📦 Matières",assets:["XAU","OIL"]},{key:"stock",label:"📈 Actions",assets:["TSLA","NVDA","AAPL"]}];

let state = { currency:"eur", asset:"BTC", horizon:"24h", countdown:10, activeTab:"prediction", activeCategory:"crypto", liveData:null, loading:true, isLive:false, chartInstance:null };

function fmt(n, cur) {
  const decimals = n < 10 ? 2 : n < 1000 ? 2 : 0;
  return new Intl.NumberFormat('fr-FR', {style:'currency', currency:cur.toUpperCase(), minimumFractionDigits:decimals, maximumFractionDigits:decimals}).format(n);
}
function fmtFull(n, cur) {
  return new Intl.NumberFormat('fr-FR', {style:'currency', currency:cur.toUpperCase(), minimumFractionDigits:2, maximumFractionDigits:2}).format(n);
}

function getFacteurs(state, indicators, sentimentGlobal, currentPrice) {
  const live = state.liveData?.facteurs;
  if(live && live.macro) return live;
  if(state.liveData?.symbol) {
    const rsi = indicators.rsi;
    const macd = indicators.macd;
    const ma7 = indicators.ma7, ma14 = indicators.ma14;
    return {
      macro: sentimentGlobal === "BULLISH" ? "Contexte macro favorable aux actifs risqués en ce moment." : sentimentGlobal === "BEARISH" ? "Contexte macro tendu, pression sur les actifs risqués." : "Contexte macro neutre, peu de catalyseurs directionnels.",
      sentiment_marche: `RSI à ${rsi} — ${rsi<30?'zone de survente, rebond possible':rsi>70?'zone de surachat, prudence':'zone neutre'}.`,
      institutionnel: `Score haussier/baissier de ${indicators.bull_score>0?'+':''}${indicators.bull_score} basé sur RSI, MACD et moyennes mobiles.`,
      technique: `MACD ${macd} · Prix ${currentPrice>ma7?'au-dessus':'en-dessous'} de la MA7 (${ma7?fmt(ma7,state.currency):'N/A'}) et ${currentPrice>ma14?'au-dessus':'en-dessous'} de la MA14 (${ma14?fmt(ma14,state.currency):'N/A'}).`,
    };
  }
  return FALLBACK[state.asset]?.facteurs || {};
}

function generateFutureCurve(currentPrice, direction, amplitude, horizonHours, sentimentScore, assetKey) {
  const points = 48;
  const trend = direction === "HAUSSE" ? 1 : direction === "BAISSE" ? -1 : 0;
  const totalMove = trend * amplitude;
  const now = Date.now();
  const intervalMs = (horizonHours * 3600 * 1000) / points;
  // Seed unique par actif + horizon pour que chaque vue soit différente
  let hash = 0;
  const seedStr = assetKey + horizonHours;
  for(let i=0;i<seedStr.length;i++){ hash = ((hash<<5)-hash) + seedStr.charCodeAt(i); hash |= 0; }
  const seed = Math.abs(hash % 1000) / 17;
  const result = [];
  for(let i=0;i<=points;i++){
    const t = now + i*intervalMs;
    const progress = i/points;
    const eased = progress<0.5 ? 2*progress*progress : -1+(4-2*progress)*progress;
    const trendComp = totalMove*eased*currentPrice/100;
    const freqScale = horizonHours <= 1 ? 1 : horizonHours <= 24 ? 0.6 : 0.3;
    const noise = (Math.sin(i*1.3*freqScale+seed*5.1)*0.3 + Math.sin(i*3.7*freqScale+seed*2.3)*0.18 + Math.cos(i*0.9*freqScale+seed*8.4)*0.12 + Math.sin(i*5.1*freqScale+seed*1.7)*0.08) * (1.2+Math.abs(sentimentScore)*0.2) * currentPrice/100;
    const d = new Date(t);
    const label = horizonHours<=24 ? d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : d.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',hour:'2-digit'});
    result.push({t, price: currentPrice+trendComp+noise, label, index:i});
  }
  return result;
}

async function fetchLiveData() {
  const assetData = ASSETS[state.asset];
  const isCrypto = assetData.category === "crypto";
  if(!isCrypto) {
    state.liveData = FALLBACK[state.asset];
    state.isLive = false;
    state.loading = false;
    render();
    return;
  }
  try {
    const res = await fetch(`${BACKEND_URL}/api/crypto/${state.asset}?currency=${state.currency}`);
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    state.liveData = data;
    state.isLive = true;
  } catch(e) {
    state.liveData = FALLBACK[state.asset] || null;
    state.isLive = false;
  } finally {
    state.loading = false;
    render();
  }
}

function switchAsset(key) {
  state.asset = key;
  state.loading = true;
  state.liveData = null;
  state.activeTab = "prediction";
  render();
  fetchLiveData();
}
function switchCategory(key) {
  state.activeCategory = key;
  switchAsset(CATEGORIES.find(c=>c.key===key).assets[0]);
}
function switchCurrency(c) {
  state.currency = c;
  state.loading = true;
  render();
  fetchLiveData();
}
function switchHorizon(h) { state.horizon = h; render(); }
function switchTab(t) { state.activeTab = t; render(); }

function drawChart(curveData, currency, currentPrice, chartColor) {
  const canvas = document.getElementById('predChart');
  if(!canvas) return;
  if(state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0,0,0,220);
  gradient.addColorStop(0, chartColor+'55');
  gradient.addColorStop(1, chartColor+'00');
  state.chartInstance = new Chart(ctx, {
    type:'line',
    data: {
      labels: curveData.map(p=>p.label),
      datasets: [{
        data: curveData.map(p=>p.price),
        borderColor: chartColor, borderWidth:2.5, backgroundColor: gradient, fill:true,
        pointRadius:0, pointHoverRadius:7, pointHitRadius:20, pointHoverBackgroundColor:chartColor, pointHoverBorderColor:'#fff', pointHoverBorderWidth:2, tension:0.4
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction: { mode:'index', intersect:false },
      plugins: { legend:{display:false}, tooltip: {
        enabled:true, mode:'index', intersect:false,
        backgroundColor:'#1a1a2e', borderColor:'#ffffff33', borderWidth:1, padding:12, titleColor:'#888', bodyColor:'#fff', titleFont:{size:10}, bodyFont:{size:16,weight:'bold'}, displayColors:false,
        callbacks: { label: c => fmtFull(c.raw, currency), title: items => items[0].dataIndex===0 ? 'MAINTENANT' : items[0].label }
      }},
      scales: {
        x: { ticks:{color:'#333',font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:6}, grid:{display:false} },
        y: { ticks:{color:'#333',font:{size:9}, callback:v=>fmt(v,currency)}, grid:{color:'#ffffff08'} }
      }
    }
  });
}

function render() {
  const app = document.getElementById('app');
  if(state.loading) {
    app.innerHTML = `<div class="loading-screen"><div style="font-size:44px">${ASSETS[state.asset].symbol}</div><div style="font-size:12px;color:${ASSETS[state.asset].color};letter-spacing:2px">Chargement données réelles...</div></div>`;
    return;
  }

  const assetData = ASSETS[state.asset];
  const isCrypto = assetData.category === "crypto";
  const currentPrice = state.liveData?.price || (state.currency==='eur'?assetData.price_eur:assetData.price_usd);
  const ch24h = state.liveData?.change_24h || 0;
  const sentiment = state.liveData?.sentiment || {};
  const sentimentGlobal = sentiment.global || state.liveData?.sentiment_global || "NEUTRAL";
  const scoresentiment = sentiment.score || state.liveData?.score_sentiment || 0;
  const predictions = state.liveData?.predictions || {};
  const indicators = state.liveData?.indicators || {};
  const news = state.liveData?.news || [];
  const facteurs = getFacteurs(state, indicators, sentimentGlobal, currentPrice);
  const resume = state.liveData?.resume || "";

  const horizonObj = HORIZONS.find(h=>h.key===state.horizon);
  const predKey = state.horizon==='1h'?'1h':state.horizon==='1sem'?'1sem':'24h';
  const pred = predictions[predKey] || {direction:"STABLE",amplitude:1,confiance:60};
  const chartColor = pred.direction==='HAUSSE'?'#00d4aa':pred.direction==='BAISSE'?'#ff4d6d':'#888';
  const curveData = generateFutureCurve(currentPrice, pred.direction, pred.amplitude, horizonObj.hours, scoresentiment, state.asset);

  const sentimentColor = sentimentGlobal==='BULLISH'?'#00d4aa':sentimentGlobal==='BEARISH'?'#ff4d6d':'#888';
  const sentimentIcon = sentimentGlobal==='BULLISH'?'▲':sentimentGlobal==='BEARISH'?'▼':'→';
  const dirColor = d=>d==='HAUSSE'?'#00d4aa':d==='BAISSE'?'#ff4d6d':'#888';
  const dirIcon = d=>d==='HAUSSE'?'↑':d==='BAISSE'?'↓':'→';
  const dirSign = d=>d==='HAUSSE'?'+':d==='BAISSE'?'-':'±';
  const now = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

  const TABS = [{key:'prediction',label:'📈 Prédiction'},{key:'indicateurs',label:'⚙️ Indicateurs'},{key:'news',label:'📰 News'},{key:'facteurs',label:'🔍 Facteurs'}];

  app.innerHTML = `
    <div class="top">
      <div class="logo">SIGNAL IA ${state.isLive?'<span class="live-badge">LIVE</span>':''}</div>
      <div class="top-right">
        <button class="cur-btn ${state.currency==='eur'?'active':''}" onclick="switchCurrency('eur')">€ EUR</button>
        <button class="cur-btn ${state.currency==='usd'?'active':''}" onclick="switchCurrency('usd')">$ USD</button>
        <div class="countdown">${state.countdown}s</div>
      </div>
    </div>

    <div class="cat-row">
      ${CATEGORIES.map(c=>`<button class="cat-btn ${state.activeCategory===c.key?'active':''}" onclick="switchCategory('${c.key}')">${c.label}</button>`).join('')}
    </div>

    <div class="asset-row">
      ${CATEGORIES.find(c=>c.key===state.activeCategory).assets.map(key=>{
        const a = ASSETS[key];
        const active = state.asset===key;
        return `<button class="asset-btn" style="${active?`border-color:${a.color};background:${a.color}22;color:${a.color}`:''}" onclick="switchAsset('${key}')">${a.symbol} ${key}</button>`;
      }).join('')}
    </div>

    <div class="price-section">
      <div class="main-price" style="color:${assetData.color}">${fmt(currentPrice, state.currency)}</div>
      <div class="asset-name">${assetData.name} ${state.isLive?'· Données en temps réel ✓':'· Données simulées'}</div>
      <div class="badges">
        <span class="badge" style="background:${ch24h>=0?'rgba(0,212,170,0.12)':'rgba(255,77,109,0.12)'};color:${ch24h>=0?'#00d4aa':'#ff4d6d'}">${ch24h>=0?'▲':'▼'} ${Math.abs(ch24h).toFixed(2)}% / 24h</span>
        <span class="badge" style="background:${sentimentColor}15;color:${sentimentColor}">${sentimentIcon} ${sentimentGlobal}</span>
      </div>
      ${resume?`<div class="resume-box">🤖 ${resume}</div>`:''}
      <div class="updated">Mis à jour à ${now}</div>
    </div>

    <div class="tabs">
      ${TABS.map(t=>`<button class="tab-btn ${state.activeTab===t.key?'active':''}" style="${state.activeTab===t.key?`color:${assetData.color};border-bottom-color:${assetData.color}`:''}" onclick="switchTab('${t.key}')">${t.label}</button>`).join('')}
    </div>

    ${state.activeTab==='prediction' ? `
      <div class="chart-wrap">
        <div class="section-label">Prédiction ${state.asset} · ${horizonObj.label} · <span style="color:${sentimentColor}">${sentimentGlobal}</span></div>
        <div style="height:220px;width:100%;position:relative"><canvas id="predChart"></canvas></div>
        <div style="font-size:9px;color:#222;text-align:center;letter-spacing:1px;margin-top:2px">TOUCHE LA COURBE POUR VOIR LES VALEURS PRÉDITES</div>
      </div>
      <div class="horizon-bar">
        ${HORIZONS.map(h=>`<button class="horizon-btn" style="${state.horizon===h.key?`background:${assetData.color}22;color:${assetData.color};border:1px solid ${assetData.color}44`:''}" onclick="switchHorizon('${h.key}')">${h.label}</button>`).join('')}
      </div>
      <div class="pred-section">
        <div class="section-label">Prédictions IA — ${assetData.name} ${state.isLive?'<span style="color:#00d4aa">· Basées sur données réelles</span>':''}</div>
        ${[
          {label:'Dans 1 heure', p: predictions['1h']||{direction:'STABLE',amplitude:0.5,confiance:60}, sub:`RSI ${indicators.rsi||'?'} · Sentiment ${sentimentGlobal}`},
          {label:'Dans 24 heures', p: predictions['24h']||{direction:'STABLE',amplitude:1.5,confiance:55}, sub: facteurs.technique||''},
          {label:'Dans 1 semaine', p: predictions['1sem']||{direction:'STABLE',amplitude:4,confiance:50}, sub: facteurs.macro||''},
        ].map(item=>`
          <div class="pred-row">
            <div style="display:flex;align-items:center;gap:12px">
              <div class="pred-icon" style="background:${item.p.direction==='HAUSSE'?'rgba(0,212,170,0.1)':item.p.direction==='BAISSE'?'rgba(255,77,109,0.1)':'rgba(136,136,136,0.1)'}">${dirIcon(item.p.direction)}</div>
              <div>
                <div style="font-size:14px;font-weight:600">${item.label}</div>
                <div style="font-size:11px;color:${dirColor(item.p.direction)};margin-top:2px">${item.p.direction}</div>
                <div style="font-size:10px;color:#333;margin-top:2px">${item.sub}</div>
              </div>
            </div>
            <div style="text-align:right">
              <div style="font-size:16px;font-weight:700;color:${dirColor(item.p.direction)};margin-bottom:4px">${dirSign(item.p.direction)}${item.p.amplitude?.toFixed(2)}%</div>
              <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">
                <div class="conf-bar"><div class="conf-fill" style="width:${item.p.confiance}%;background:${assetData.color}"></div></div>
                <div style="font-size:11px;color:#444">${item.p.confiance}%</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    ${state.activeTab==='indicateurs' ? `
      <div class="pred-section">
        <div class="section-label">Indicateurs ${state.isLive?'· Temps réel ✓':'· Simulés'}</div>
        ${[
          {name:'RSI (14j)', val:`${indicators.rsi||'N/A'} · ${indicators.rsi<30?'Survendu':indicators.rsi>70?'Suracheté':indicators.rsi>50?'Haussier':'Baissier'}`, color: indicators.rsi<30?'#00d4aa':indicators.rsi>70?'#ff4d6d':indicators.rsi>50?'#00d4aa':'#ff4d6d'},
          {name:'MACD', val: indicators.macd||'N/A', color: indicators.macd==='POSITIF'?'#00d4aa':'#ff4d6d'},
          {name:'MA7', val: indicators.ma7?fmt(indicators.ma7,state.currency):'N/A', color: currentPrice>(indicators.ma7||0)?'#00d4aa':'#ff4d6d'},
          {name:'MA14', val: indicators.ma14?fmt(indicators.ma14,state.currency):'N/A', color: currentPrice>(indicators.ma14||0)?'#00d4aa':'#ff4d6d'},
          {name:'Volatilité 14j', val:`${indicators.volatility||'N/A'}%`, color: (indicators.volatility||0)>4?'#ff4d6d':(indicators.volatility||0)>2?'#888':'#00d4aa'},
          {name:'Score Bull/Bear', val:`${(indicators.bull_score||0)>0?'+':''}${indicators.bull_score||0}`, color:(indicators.bull_score||0)>0?'#00d4aa':(indicators.bull_score||0)<0?'#ff4d6d':'#888'},
        ].map(ind=>`<div class="ind-row"><span style="font-size:13px;color:#666">${ind.name}</span><span style="font-size:13px;font-weight:600;color:${ind.color}">${ind.val}</span></div>`).join('')}
        <div style="margin-top:20px;padding:14px;background:#0d0d1a;border-radius:8px;border:1px solid #1a1a2e">
          <div style="font-size:10px;color:#444;letter-spacing:2px;margin-bottom:10px">SCORE SENTIMENT GLOBAL</div>
          <div style="display:flex;align-items:center;gap:12px">
            <div style="flex:1;height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden"><div style="width:${50+scoresentiment*25}%;height:100%;background:${sentimentColor};border-radius:3px"></div></div>
            <div style="font-size:16px;font-weight:700;color:${sentimentColor}">${scoresentiment>0?'+':''}${scoresentiment.toFixed(1)}</div>
          </div>
        </div>
      </div>
    ` : ''}

    ${state.activeTab==='news' ? `
      <div class="pred-section">
        <div class="sentiment-box" style="background:${sentimentColor}15;border:1px solid ${sentimentColor}33">
          <div style="font-size:10px;color:#555;letter-spacing:2px;margin-bottom:8px">SIGNAL ${state.asset} ${state.isLive?'· NEWS RÉELLES ✓':''}</div>
          <div style="font-size:22px;font-weight:700;color:${sentimentColor};margin-bottom:6px">${sentimentIcon} ${sentimentGlobal}</div>
          <div style="font-size:12px;color:#888;line-height:1.5">${resume}</div>
        </div>
        ${news.map(n=>{
          const sc = (n.score||0)>0?'#00d4aa':(n.score||0)<0?'#ff4d6d':'#888';
          return `<div class="news-item"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
            <div style="flex:1"><div style="font-size:12px;color:#ddd;line-height:1.4;margin-bottom:6px">${n.titre}</div>${n.source?`<div style="font-size:10px;color:#333;margin-bottom:4px">${n.source}</div>`:''}<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:${sc}20;color:${sc};font-weight:600">${n.impact}</span></div>
            <div style="font-size:16px;font-weight:700;color:${sc};flex-shrink:0">${(n.score||0)>0?'+':''}${n.score||0}</div>
          </div></div>`;
        }).join('')}
      </div>
    ` : ''}

    ${state.activeTab==='facteurs' ? `
      <div class="pred-section">
        <div class="section-label">Facteurs d'analyse — ${assetData.name}</div>
        ${Object.entries({'🌍 Macro':facteurs.macro,'💬 Sentiment':facteurs.sentiment_marche,'🏦 Institutionnel':facteurs.institutionnel,'📊 Technique':facteurs.technique}).map(([k,v])=>`<div class="fact-item"><div style="font-size:11px;color:#666;margin-bottom:6px">${k}</div><div style="font-size:13px;color:#ccc;line-height:1.5">${v||'Données en cours de chargement...'}</div></div>`).join('')}
      </div>
    ` : ''}

    <div class="footer-note">${state.isLive?'Données temps réel via CoinGecko · ':''}Analyse IA · Pas un conseil en investissement</div>
  `;

  if(state.activeTab === 'prediction') {
    setTimeout(()=>drawChart(curveData, state.currency, currentPrice, chartColor), 50);
  }
}

setInterval(()=>{
  state.countdown--;
  if(state.countdown<=0) { state.countdown=10; fetchLiveData(); }
  else { const el = document.querySelector('.countdown'); if(el) el.textContent = state.countdown+'s'; }
}, 1000);

fetchLiveData();
</script>
</body>
</html>
